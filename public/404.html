<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Portfolio</title>
    <script>
      /**
       * GitHub Pages SPA 라우팅 해결책
       * 출처: https://github.com/rafgraph/spa-github-pages
       *
       * 404 발생 시 → URL을 쿼리스트링으로 인코딩해서 index.html로 리다이렉트.
       * segmentCount: 1 = 레포 이름 세그먼트 1개 (/Portfolio)
       */
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
