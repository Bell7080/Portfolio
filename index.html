    <!-- GitHub Pages SPA 라우팅: 404.html에서 인코딩된 경로를 복원 -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&'); });
          window.history.replaceState(
            null,
            null,
            decoded.shift() +
              (decoded.length ? '?' + decoded.join('&') : '') +
              l.hash
          );
        }
      })(window.location);
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
